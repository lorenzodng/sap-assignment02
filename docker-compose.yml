services:

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
      - "9080:9080"
    environment:
      - PORT=8080
      - METRICS_PORT=9080
      - REQUEST_SERVICE_URL=http://request-service:8081
      - DRONE_SERVICE_URL=http://drone-service:8082
      - DELIVERY_SERVICE_URL=http://delivery-service:8083
      - JAEGER_ENDPOINT=http://jaeger:4317
    depends_on:
      request-service:
        condition: service_healthy
      drone-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
      jaeger:
        condition: service_started

  request-service:
    build: ./request-service
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      - PORT=8081
      - METRICS_PORT=9081
      - DRONE_SERVICE_URL=http://drone-service:8082
      - JAEGER_ENDPOINT=http://jaeger:4317
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  drone-service:
    build: ./drone-service
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      - PORT=8082
      - METRICS_PORT=9082
      - DELIVERY_SERVICE_URL=http://delivery-service:8083
      - JAEGER_ENDPOINT=http://jaeger:4317
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  delivery-service:
    build: ./delivery-service
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      - PORT=8083
      - METRICS_PORT=9083
      - JAEGER_ENDPOINT=http://jaeger:4317
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  autoheal:
    image: willfarrell/autoheal
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api-gateway
      - request-service
      - drone-service
      - delivery-service

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true